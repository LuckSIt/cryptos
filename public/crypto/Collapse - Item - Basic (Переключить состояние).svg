<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1366" height="1509" viewBox="0 0 1366 1509"><defs><clipPath id="a"><rect width="14" height="14" fill="none"/></clipPath><clipPath id="b"><rect width="16" height="16" fill="none"/></clipPath></defs><rect width="1366" height="1509" fill="#243c67"/><path d="M30,0H1058a30,30,0,0,1,30,30V219a30,30,0,0,1-30,30H30A30,30,0,0,1,0,219V30A30,30,0,0,1,30,0Z" transform="translate(139 720)" fill="#1890ff"/><g transform="translate(155 734)"><g transform="translate(0 3)"><rect width="14" height="14" fill="none"/><g clip-path="url(#a)"><rect width="14" height="14" fill="none"/><path d="M10.281,0H9.256A.22.22,0,0,0,9.08.09L5.2,5.444,1.311.09A.22.22,0,0,0,1.135,0H.11A.11.11,0,0,0,.021.174L4.841,6.82a.436.436,0,0,0,.707,0L10.369.174A.109.109,0,0,0,10.281,0Z" transform="translate(1.805 3.5)" fill="#fff"/></g></g><text transform="translate(24)" fill="#fff" font-size="14" font-family="SegoeUI, Segoe UI"><tspan x="0" y="15">Внимательно изучите инструкцию полностью</tspan></text></g><g transform="translate(139 767)"><text transform="translate(16 16)" fill="#fff" font-size="14" font-family="SegoeUI, Segoe UI"><tspan x="0" y="15">1.Создайте заявку, указав сумму, Ваш </tspan><tspan y="15">e-mail, </tspan><tspan y="15">контакт и номер вашей карты. Будьте внимательны при вводе данных. Нажмите продолжить.</tspan><tspan x="0" y="37">2.Ознакомьтесь с условиями договора на оказание услуг обмена, если вы принимаете их, поставьте галочку в соответствующем поле/нажмите кнопку </tspan><tspan x="0" y="59">(«Согласен»). Еще раз проверьте данные заявки и нажмите создать заявку.</tspan><tspan x="0" y="81">3.Оплатите заявку. Переводите точную сумму, указанною в системе, в противном случае обмен может затянуться, т.к. потребуются дополнительные уточнения.</tspan><tspan x="0" y="103">4.После перевода нажмите «Я оплатил». С этого момента заявка начнет обрабатываться.</tspan><tspan x="0" y="125">5.После выполнения указанных действий, система переместит Вас на страницу «Состояние заявки», где будет указан статус вашего перевода</tspan><tspan x="0" y="147">6. Операция занимает от 5 до 60 минут в рабочее время (11.00 — 22.00 по МСК), иногда возможны задержки из за очереди или технических моментов.</tspan></text></g><g transform="translate(1192 736)"><rect width="16" height="16" fill="none"/><g clip-path="url(#b)"><rect width="16" height="16" fill="none"/><path d="M13.5,12.25H.5a.5.5,0,0,1-.433-.75L6.568.25a.5.5,0,0,1,.866,0l6.5,11.25a.5.5,0,0,1-.433.75ZM7,1.873,1.691,11.064H12.31Z" transform="translate(1 1.875)" fill="#fc0000"/><path d="M10.619,9.191H0L5.309,0l5.309,9.19ZM5.309,6.767a.75.75,0,1,0,.525.214A.747.747,0,0,0,5.309,6.767Zm-.375-4.14a.125.125,0,0,0-.125.125V5.627a.125.125,0,0,0,.125.125h.75a.125.125,0,0,0,.125-.125V2.752a.125.125,0,0,0-.125-.125Z" transform="translate(2.691 3.748)" fill="none"/><path d="M.75,5.625a.75.75,0,1,1,.53-.22A.747.747,0,0,1,.75,5.625Zm.375-2.5H.375A.125.125,0,0,1,.25,3V.125A.125.125,0,0,1,.375,0h.75A.125.125,0,0,1,1.25.125V3A.125.125,0,0,1,1.125,3.125Z" transform="translate(7.25 6.375)" fill="#fc0000"/></g></g></svg>