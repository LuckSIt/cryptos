<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1088" height="312" viewBox="0 0 1088 312"><defs><clipPath id="a"><rect width="14" height="14" fill="none"/></clipPath><clipPath id="b"><rect width="24" height="24" fill="none"/></clipPath></defs><g fill="#1890ff" stroke="#50ff44" stroke-width="1"><rect width="1088" height="312" rx="30" stroke="none"/><rect x="0.5" y="0.5" width="1087" height="311" rx="29.5" fill="none"/></g><g transform="translate(16 14)"><g transform="translate(0 3)"><rect width="14" height="14" fill="none"/><g clip-path="url(#a)"><rect width="14" height="14" fill="none"/><path d="M10.281,0H9.256A.22.22,0,0,0,9.08.09L5.2,5.444,1.311.09A.22.22,0,0,0,1.135,0H.11A.11.11,0,0,0,.021.174L4.841,6.82a.436.436,0,0,0,.707,0L10.369.174A.109.109,0,0,0,10.281,0Z" transform="translate(1.805 3.5)" fill="#fff"/></g></g><text transform="translate(24)" fill="#fff" font-size="14" font-family="SegoeUI-Semibold, Segoe UI" font-weight="600"><tspan x="0" y="15">Внимательно изучите инструкцию полностью</tspan></text></g><g transform="translate(0 47)"><text transform="translate(16 16)" fill="#fff" font-size="14" font-family="SegoeUI, Segoe UI"><tspan x="0" y="15">Алгоритм обмена </tspan><tspan y="15">Tether TRC20 USDT-Visa/MasterCard USD:</tspan><tspan x="0" y="37">Перевод доступен только на *****.</tspan><tspan x="0" y="59"></tspan><tspan x="0" y="81">1.Создайте заявку, указав сумму, Ваш </tspan><tspan y="81">e-mail, </tspan><tspan y="81">контакт и номер вашей карты. Будьте внимательны при вводе данных. Нажмите продолжить.</tspan><tspan x="0" y="103">2.Ознакомьтесь с условиями договора на оказание услуг обмена, если вы принимаете их, поставьте галочку в соответствующем поле/нажмите кнопку </tspan><tspan x="0" y="125">(«Согласен»). Еще раз проверьте данные заявки и нажмите создать заявку.</tspan><tspan x="0" y="147">3.Оплатите заявку. Переводите точную сумму, указанною в системе, в противном случае обмен может затянуться, т.к. потребуются дополнительные уточнения.</tspan><tspan x="0" y="169">4.После перевода нажмите «Я оплатил». С этого момента заявка начнет обрабатываться.</tspan><tspan x="0" y="191">5.После выполнения указанных действий, система переместит Вас на страницу «Состояние заявки», где будет указан статус вашего перевода</tspan><tspan x="0" y="213">6. Операция занимает от 5 до 60 минут в рабочее время (11.00 — 22.00 по МСК), иногда возможны задержки из за очереди или технических моментов.</tspan></text></g><g transform="translate(1045 12)"><rect width="24" height="24" fill="none"/><g clip-path="url(#b)"><rect width="24" height="24" fill="none"/><path d="M20.251,18.375H.751A.75.75,0,0,1,.1,17.25L9.851.375a.749.749,0,0,1,1.3,0L20.9,17.25a.75.75,0,0,1-.649,1.125ZM10.5,2.81,2.536,16.6H18.464Z" transform="translate(1.499 2.813)" fill="#fc0000"/><path d="M15.928,13.786H0L7.964,0l7.963,13.785ZM7.964,10.15a1.125,1.125,0,1,0,.787.321A1.12,1.12,0,0,0,7.964,10.15ZM7.4,3.94a.187.187,0,0,0-.187.187V8.44a.187.187,0,0,0,.187.187H8.527a.187.187,0,0,0,.187-.187V4.127a.187.187,0,0,0-.187-.187Z" transform="translate(4.037 5.623)" fill="none"/><path d="M1.125,8.438a1.125,1.125,0,1,1,.8-.329A1.121,1.121,0,0,1,1.125,8.438Zm.563-3.75H.563A.187.187,0,0,1,.375,4.5V.187A.187.187,0,0,1,.563,0H1.688a.187.187,0,0,1,.187.187V4.5A.187.187,0,0,1,1.688,4.687Z" transform="translate(10.875 9.563)" fill="#fc0000"/></g></g></svg>